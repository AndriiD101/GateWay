server {
    listen 80;

    root /usr/share/nginx/html;

    # ── Static assets ──────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend proxy – BACKEND_URL is injected at container start via envsubst ─

    location /api {
        proxy_pass ${BACKEND_URL}/api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai {
        proxy_pass ${BACKEND_URL}/ai;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location /trips {
        proxy_pass ${BACKEND_URL}/trips;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /blob {
        proxy_pass ${BACKEND_URL}/blob;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass ${BACKEND_URL}/health;
        proxy_set_header Host $http_host;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
