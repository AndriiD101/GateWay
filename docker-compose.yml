version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: gateway_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: gateway_db
    ports:
      - "3306:3306"
    volumes:
      - ./db-init/gateway_init_clean.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # Використовуємо CMD-SHELL, щоб мати доступ до змінних середовища
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      timeout: 5s
      interval: 2s
      retries: 10

  web:
    build: ./backend
    container_name: gateway_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=gateway_db
      - SECRET_KEY=my-super-secret-jwt-key-32-chars-long!!!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: gateway_frontend
    ports:
      - "8080:80"
    depends_on:
      - web
