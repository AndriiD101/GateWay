server {
    listen 80;

    root /usr/share/nginx/html;

    location ~* \.(jpg|jpeg|png|gif|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Auth & chat API → FastAPI backend (port 8000)
    location /api {
        proxy_pass http://web:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI trip planner → FastAPI backend
    location /ai {
        proxy_pass http://web:8000/ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
    }

    # Trips CRUD
    location /trips {
        proxy_pass http://web:8000/trips;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Blob & DB health
    location /blob {
        proxy_pass http://web:8000/blob;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://web:8000/health;
        proxy_set_header Host $host;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}