version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway_frontend
    ports:
      - "3000:80"
    environment:
      # Point to backend service
      # For local development with separate backend container:
      - BACKEND_API_URL=http://gateway_backend:8000
      
      # For Azure deployment, use your actual backend URL
      # - BACKEND_API_URL=https://your-gateway-backend.azurewebsites.net
    restart: unless-stopped

